<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" fill="none" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">
    Cypher architecture
  </text>
  <text x="500" y="60" text-anchor="middle" font-size="12" fill="#737373">
    Privacy during execution. Transparency at the boundary.
  </text>

  <!-- ===== Top row: BASE LAYER ===== -->
  <g>
    <rect x="40" y="100" width="920" height="130" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1.5"/>
    <text x="60" y="125" font-size="10" font-weight="600" fill="#737373" letter-spacing="0.1em">SOLANA BASE LAYER · DEVNET</text>

    <!-- Cypher Program -->
    <rect x="80" y="145" width="220" height="65" rx="8" fill="#fff" stroke="#DC2626" stroke-width="2"/>
    <text x="190" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0a0a">Cypher Program</text>
    <text x="190" y="188" text-anchor="middle" font-size="10" fill="#737373" font-family="ui-monospace, SFMono-Regular, monospace">4ofnnZ…7jPrtJC</text>
    <text x="190" y="202" text-anchor="middle" font-size="9" fill="#737373">Anchor · 3 dimensions · attestation events</text>

    <!-- Agent Reputation PDA -->
    <rect x="340" y="145" width="180" height="65" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1.5"/>
    <text x="430" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0a0a0a">AgentReputation PDA</text>
    <text x="430" y="186" text-anchor="middle" font-size="9" fill="#737373">payment counters</text>
    <text x="430" y="198" text-anchor="middle" font-size="9" fill="#737373">credit counters</text>
    <text x="430" y="210" text-anchor="middle" font-size="9" fill="#737373">30-day volume buckets</text>

    <!-- Permission PDA -->
    <rect x="560" y="145" width="180" height="65" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1.5"/>
    <text x="650" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0a0a0a">Permission PDA</text>
    <text x="650" y="188" text-anchor="middle" font-size="9" fill="#737373">delegation ACL</text>
    <text x="650" y="202" text-anchor="middle" font-size="9" fill="#737373">members + flags</text>

    <!-- Recorder Authority -->
    <rect x="780" y="145" width="160" height="65" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1.5"/>
    <text x="860" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0a0a0a">Recorder authority</text>
    <text x="860" y="188" text-anchor="middle" font-size="9" fill="#737373">signs record_event calls</text>
    <text x="860" y="202" text-anchor="middle" font-size="9" fill="#737373">v2: per-source keys</text>
  </g>

  <!-- Delegate arrow (down) -->
  <g>
    <path d="M 430 230 L 430 290" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="430,295 425,285 435,285" fill="#DC2626"/>
    <text x="445" y="265" font-size="10" font-weight="600" fill="#DC2626">delegate()</text>
    <text x="445" y="278" font-size="9" fill="#737373">PDA → TEE</text>
  </g>

  <!-- Undelegate arrow (up) -->
  <g>
    <path d="M 650 290 L 650 230" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="650,225 645,235 655,235" fill="#0a0a0a"/>
    <text x="665" y="265" font-size="10" font-weight="600" fill="#0a0a0a">commit()</text>
    <text x="665" y="278" font-size="9" fill="#737373">state → base</text>
  </g>

  <!-- ===== Middle row: TEE ===== -->
  <g>
    <rect x="40" y="295" width="920" height="130" rx="12" fill="#0a0a0a" stroke="#262626" stroke-width="1.5"/>
    <text x="60" y="320" font-size="10" font-weight="600" fill="#a3a3a3" letter-spacing="0.1em">MAGICBLOCK PRIVATE EPHEMERAL ROLLUP · INTEL TDX</text>

    <!-- TEE Validator -->
    <rect x="80" y="340" width="220" height="65" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5"/>
    <text x="190" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#fafafa">TEE validator</text>
    <text x="190" y="383" text-anchor="middle" font-size="10" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, monospace">MTEWGu…3n3xzo</text>
    <text x="190" y="397" text-anchor="middle" font-size="9" fill="#a3a3a3">attested execution environment</text>

    <!-- Private state -->
    <rect x="340" y="340" width="180" height="65" rx="8" fill="#171717" stroke="#DC2626" stroke-width="1.5"/>
    <text x="430" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#fafafa">Reputation in TEE</text>
    <text x="430" y="383" text-anchor="middle" font-size="9" fill="#a3a3a3">events recorded privately</text>
    <text x="430" y="397" text-anchor="middle" font-size="9" fill="#a3a3a3">scores computed inside</text>

    <!-- Threshold check -->
    <rect x="560" y="340" width="220" height="65" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5"/>
    <text x="670" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#fafafa">Threshold check</text>
    <text x="670" y="383" text-anchor="middle" font-size="9" fill="#a3a3a3">score &gt;= threshold ?</text>
    <text x="670" y="397" text-anchor="middle" font-size="9" fill="#a3a3a3">emits AttestationEvent</text>

    <!-- Privacy seal -->
    <rect x="820" y="340" width="120" height="65" rx="8" fill="#171717" stroke="#404040" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="880" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#fafafa">No leakage</text>
    <text x="880" y="383" text-anchor="middle" font-size="9" fill="#a3a3a3">scores never</text>
    <text x="880" y="397" text-anchor="middle" font-size="9" fill="#a3a3a3">leave the TEE</text>
  </g>

  <!-- Attestation arrow (down to verifier) -->
  <g>
    <path d="M 670 425 L 670 470" stroke="#DC2626" stroke-width="1.5"/>
    <polygon points="670,475 665,465 675,465" fill="#DC2626"/>
    <text x="685" y="455" font-size="10" font-weight="600" fill="#DC2626">{ passes: true|false, threshold }</text>
  </g>

  <!-- ===== Bottom row: VERIFIER ===== -->
  <g>
    <rect x="40" y="475" width="920" height="55" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1.5"/>
    <text x="60" y="498" font-size="10" font-weight="600" fill="#737373" letter-spacing="0.1em">VERIFIER APPLICATION</text>

    <!-- Three example verifiers -->
    <g transform="translate(280, 488)">
      <circle cx="0" cy="6" r="3" fill="#10B981"/>
      <text x="10" y="10" font-size="11" fill="#0a0a0a">Velo Pay (merchant)</text>
    </g>
    <g transform="translate(470, 488)">
      <circle cx="0" cy="6" r="3" fill="#3B82F6"/>
      <text x="10" y="10" font-size="11" fill="#0a0a0a">Orbit Credit (lender)</text>
    </g>
    <g transform="translate(660, 488)">
      <circle cx="0" cy="6" r="3" fill="#A855F7"/>
      <text x="10" y="10" font-size="11" fill="#0a0a0a">Atlas OTC (auction)</text>
    </g>
    <text x="850" y="498" font-size="10" fill="#737373" font-style="italic">…or any Solana app</text>
  </g>
</svg>
